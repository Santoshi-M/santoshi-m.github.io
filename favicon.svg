<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g transform="translate(16,16)">
    <!-- 5 chubby petals at 72° intervals — wider rx, shorter ry -->
    <ellipse cx="0" cy="-6.5" rx="5.5" ry="6.5" fill="#5a5070" opacity="0.92" transform="rotate(0)"/>
    <ellipse cx="0" cy="-6.5" rx="5.5" ry="6.5" fill="#5a5070" opacity="0.92" transform="rotate(72)"/>
    <ellipse cx="0" cy="-6.5" rx="5.5" ry="6.5" fill="#5a5070" opacity="0.92" transform="rotate(144)"/>
    <ellipse cx="0" cy="-6.5" rx="5.5" ry="6.5" fill="#5a5070" opacity="0.92" transform="rotate(216)"/>
    <ellipse cx="0" cy="-6.5" rx="5.5" ry="6.5" fill="#5a5070" opacity="0.92" transform="rotate(288)"/>
    <!-- Centre circle -->
    <circle cx="0" cy="0" r="7" fill="#3d3d52"/>
    <!-- S letter -->
    <text x="0" y="4.5"
      font-family="Georgia, serif"
      font-size="10"
      font-weight="700"
      fill="#e8eaf6"
      text-anchor="middle">S</text>
  </g>
</svg>
